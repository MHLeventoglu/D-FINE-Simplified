task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

num_classes: 80 # your dataset classes
remap_mscoco_category: False

val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /content/dataset/images
    ann_file: /content/dataset/annotations_coco.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
